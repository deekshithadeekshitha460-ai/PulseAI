<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PulseAI — Live Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #020617;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-card: rgba(30, 41, 59, 0.4);
            --accent-emerald: #10b981;
            --accent-indigo: #6366f1;
            --status-healthy: #10b981;
            --status-warning: #f59e0b;
            --status-critical: #f43f5e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 24px;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            padding: 20px 32px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .title-group h1 {
            font-size: 28px;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-group h1 span { color: var(--accent-emerald); }

        .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            margin-top: 4px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 16px;
            border-radius: 99px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-emerald);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-emerald);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* BANNER */
        #systemic-banner {
            display: none;
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.2), rgba(244, 63, 94, 0.1));
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--status-critical);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 32px;
            font-weight: 600;
            animation: systemic-glow 3s infinite;
        }

        @keyframes systemic-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(244, 63, 94, 0.1); }
            50% { box-shadow: 0 0 40px rgba(244, 63, 94, 0.3); }
        }

        /* GRID */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        /* CARDS */
        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 24px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .machine-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .machine-name {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .health-viz {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            position: relative;
        }

        .health-ring-svg {
            width: 100px;
            height: 100px;
        }

        .health-score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 24px;
        }

        .sensor-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sensor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* HEATMAP */
        .section-glass {
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 32px;
            margin-bottom: 32px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            margin-bottom: 24px;
        }

        .heatmap-table {
            display: grid;
            grid-template-columns: 120px repeat(4, 1fr);
            gap: 8px;
        }

        .hm-label { color: var(--text-secondary); font-size: 12px; font-weight: 600; padding: 12px; }
        .hm-cell {
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .hm-val { font-size: 15px; font-weight: 700; display: block; }
        .hm-sub { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }

        /* ALERTS */
        .bottom-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .alert-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 16px;
            transition: background 0.2s;
        }

        .alert-card.acknowledged { opacity: 0.5; filter: grayscale(0.5); }

        .severity-pill {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .msg-box {
            font-family: 'JetBrains Mono', 'Inter', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            margin: 16px 0;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .report-section {
            color: var(--text-primary);
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: block;
            margin-top: 12px;
            margin-bottom: 4px;
            color: var(--accent-indigo);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding-bottom: 2px;
        }

        .report-section:first-child { margin-top: 0; }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-ack {
            background: var(--accent-indigo);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-ack:hover { background: #4f46e5; }

        /* TTF PANEL */
        .ttf-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .ttf-val {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
            margin: 8px 0;
        }

        /* CHART */
        .chart-controls select {
            background: var(--bg-surface);
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="title-group">
            <h1><i data-lucide="zap" style="color:var(--accent-emerald)"></i><span>Pulse</span>AI</h1>
            <div class="subtitle">PREDICTIVE MAINTENANCE ENGINE • TEAM SAHASTRIX • MALENADU 2026</div>
        </div>
        <div class="live-indicator">
            <span class="live-dot"></span>
            <span style="font-size: 13px; font-weight: 600; letter-spacing: 0.05em;" id="clock">--:--:--</span>
        </div>
    </header>

    <!-- SYSTEMIC BANNER -->
    <div id="systemic-banner"></div>

    <!-- MAIN DASHBOARD GRID -->
    <div class="dashboard-grid" id="machines-grid"></div>

    <!-- SENSOR DEVIATION HEATMAP -->
    <section class="section-glass">
        <h2 class="section-title"><i data-lucide="grid"></i>Sensor Deviation Heatmap</h2>
        <div class="heatmap-table" id="heatmap"></div>
    </section>

    <!-- ALERTS & TTF -->
    <div class="bottom-layout">
        <section class="section-glass">
            <h2 class="section-title"><i data-lucide="bell"></i>Live Alert Engine</h2>
            <div id="alert-list"></div>
        </section>
        
        <section class="section-glass">
            <h2 class="section-title"><i data-lucide="clock"></i>Time-to-Failure Projections</h2>
            <div id="ttf-list"></div>
        </section>
    </div>

    <!-- ANALYTICS TIMELINE -->
    <section class="section-glass">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
            <h2 class="section-title" style="margin-bottom:0;"><i data-lucide="activity"></i>Deep-Stream Analytics</h2>
            <div class="chart-controls" style="display:flex; gap:12px;">
                <select id="chart-machine">
                    <option>CNC_01</option><option>CNC_02</option>
                    <option>PUMP_03</option><option>CONVEYOR_04</option>
                </select>
                <select id="chart-sensor">
                    <option value="temperature_C">Temperature</option>
                    <option value="vibration_mm_s">Vibration</option>
                    <option value="rpm">RPM</option>
                    <option value="current_A">Current</option>
                </select>
            </div>
        </div>
        <canvas id="timeline-chart" height="80"></canvas>
    </section>

    <!-- CALENDAR -->
    <section class="section-glass">
        <h2 class="section-title"><i data-lucide="calendar"></i>Priority Maintenance Schedule</h2>
        <div id="calendar"></div>
    </section>

    <script>
        const MACHINES = ["CNC_01", "CNC_02", "PUMP_03", "CONVEYOR_04"];
        const SENSORS = ["temperature_C", "vibration_mm_s", "rpm", "current_A"];
        const SENSOR_LABELS = {
            temperature_C: "Temp °C", vibration_mm_s: "Vib mm/s",
            rpm: "RPM", current_A: "Current A"
        };

        // Store last 60 readings per machine per sensor
        const history = {};
        MACHINES.forEach(m => { history[m] = {}; SENSORS.forEach(s => { history[m][s] = []; }); });

        // Baselines (filled when first data arrives — approximated from first 10 readings)
        const approxBaseline = {};

        // Timeline chart
        const ctx = document.getElementById("timeline-chart").getContext("2d");
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(99, 102, 241, 0.2)');
        gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

        const timelineChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: Array(60).fill(""),
                datasets: [
                    {
                        label: "Sensor Stream", data: [], 
                        borderColor: "#6366f1", borderWidth: 2,
                        backgroundColor: gradient,
                        fill: true,
                        pointRadius: 0, tension: 0.4
                    },
                    {
                        label: "Dynamic Baseline", data: [], 
                        borderColor: "rgba(255, 255, 255, 0.2)", borderWidth: 1,
                        borderDash: [6, 6], pointRadius: 0, fill: false
                    },
                ]
            },
            options: {
                animation: false, responsive: true,
                plugins: { 
                    legend: { 
                        display: true,
                        labels: { color: "#94a3b8", font: { family: 'Inter', size: 12, weight: 500 }, usePointStyle: true } 
                    } 
                },
                scales: {
                    x: { ticks: { color: "#64748b", font: { size: 10 } }, grid: { display: false } },
                    y: { ticks: { color: "#64748b", font: { size: 10 } }, grid: { color: "rgba(255,255,255,0.03)" } }
                }
            }
        });

        function updateTimelineChart() {
            const machine = document.getElementById("chart-machine").value;
            const sensor = document.getElementById("chart-sensor").value;
            const vals = history[machine]?.[sensor] || [];
            const baseline = approxBaseline[machine]?.[sensor];
            
            timelineChart.data.datasets[0].label = `${machine} ${SENSOR_LABELS[sensor]}`;
            timelineChart.data.datasets[0].data = [...vals];
            timelineChart.data.datasets[1].data = baseline ? Array(vals.length).fill(baseline.mean) : [];
            timelineChart.data.labels = Array(vals.length).fill("").map((_, i) => i === vals.length - 1 ? "LIVE" : "");
            timelineChart.update("none");
        }

        document.getElementById("chart-machine").onchange = updateTimelineChart;
        document.getElementById("chart-sensor").onchange = updateTimelineChart;

        // Clock
        function healthScore(machine_id, readings) {
            if (!readings || !approxBaseline[machine_id]) return 100;
            let totalSigma = 0, count = 0;
            SENSORS.forEach(s => {
                if (readings[s] == null || !approxBaseline[machine_id]?.[s]) return;
                const { mean, std } = approxBaseline[machine_id][s];
                totalSigma += Math.abs(readings[s] - mean) / std;
                count++;
            });
            if (!count) return 100;
            return Math.max(0, Math.min(100, Math.round(100 - (totalSigma / count) * 20)));
        }

        setInterval(() => {
            document.getElementById("clock").textContent = new Date().toLocaleTimeString();
        }, 1000);

        // Health score computation
        function healthColor(score) {
            if (score >= 80) return "#10b981";
            if (score >= 40) return "#f59e0b";
            return "#f43f5e";
        }

        function renderHealthRing(score) {
            const color = healthColor(score);
            const r = 36, cx = 50, cy = 50;
            const circ = 2 * Math.PI * r;
            const filled = circ * (score / 100);
            return `
                <div class="health-viz">
                    <svg class="health-ring-svg" viewBox="0 0 100 100">
                        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"/>
                        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
                            stroke-dasharray="${filled} ${circ}" stroke-linecap="round"
                            transform="rotate(-90 ${cx} ${cy})" style="transition: stroke-dasharray 1s ease;"/>
                    </svg>
                    <div class="health-score-text" style="color:${color}">${score}</div>
                </div>`;
        }

        function renderMachineCards(readings, streams) {
            const grid = document.getElementById("machines-grid");
            grid.innerHTML = MACHINES.map(m => {
                const r = readings[m] || {};
                const score = healthScore(m, r);
                const status = streams[m] || "OFFLINE";
                const isLive = status === "live";

                let rows = SENSORS.map(s => {
                    const val = r[s] != null ? r[s].toFixed(1) : "--";
                    const sig = approxBaseline[m]?.[s] ? Math.abs(r[s] - approxBaseline[m][s].mean) / approxBaseline[m][s].std : 0;
                    const c = sig > 2.5 ? "var(--status-critical)" : sig > 1.5 ? "var(--status-warning)" : "var(--status-healthy)";
                    return `
                        <div class="sensor-item">
                            <span style="display:flex; align-items:center; color:var(--text-secondary); font-weight:500;">
                                <span class="status-dot" style="background:${c}"></span>${SENSOR_LABELS[s]}
                            </span>
                            <span style="font-weight:700;">${val}</span>
                        </div>`;
                }).join("");

                return `
                    <div class="glass-card machine-card">
                        <div class="machine-name" style="display:flex; justify-content:space-between;">
                            ${m}
                            <i data-lucide="cpu" style="width:14px; opacity:0.5;"></i>
                        </div>
                        ${renderHealthRing(score)}
                        <div class="sensor-list">${rows}</div>
                        <div style="margin-top:20px; display:flex; align-items:center; gap:8px; font-size:11px; font-weight:600; color:${isLive?'var(--status-healthy)':'var(--text-secondary)'}">
                            <div class="live-dot" style="width:6px; height:6px; background:${isLive?'var(--status-healthy)':'#444'}; animation:none;"></div>
                            ${status.toUpperCase()}
                        </div>
                    </div>`;
            }).join("");
        }

        function renderHeatmap(readings) {
            const hm = document.getElementById("heatmap");
            let html = `<div class="hm-label"></div>` + SENSORS.map(s => `<div class="hm-label">${SENSOR_LABELS[s]}</div>`).join("");
            
            MACHINES.forEach(m => {
                html += `<div class="hm-label" style="display:flex; align-items:center;">${m}</div>`;
                SENSORS.forEach(s => {
                    const val = readings[m]?.[s];
                    const baseline = approxBaseline[m]?.[s];
                    let bg = "rgba(255,255,255,0.02)", sig = 0;
                    if (val != null && baseline) {
                        sig = Math.abs(val - baseline.mean) / baseline.std;
                        if (sig >= 3) bg = "rgba(244, 63, 94, 0.2)";
                        else if (sig >= 2) bg = "rgba(245, 158, 11, 0.2)";
                    }
                    html += `
                        <div class="hm-cell" style="background:${bg}; border-color:${sig > 2 ? 'rgba(255,255,255,0.1)' : 'var(--border)'}">
                            <span class="hm-val">${val != null ? val.toFixed(1) : "--"}</span>
                            <span class="hm-sub">${sig > 0 ? sig.toFixed(1) + "σ" : "--"}</span>
                        </div>`;
                });
            });
            hm.innerHTML = html;
        }

        function renderAlerts(alerts, scheduled) {
            const list = document.getElementById("alert-list");
            list.innerHTML = [...alerts].reverse().map(a => {
                const color = { CRITICAL: 'var(--status-critical)', HIGH: 'var(--status-warning)', MEDIUM: '#60a5fa', LOW: 'var(--status-healthy)' }[a.severity];
                const ackClass = a.acknowledged ? "acknowledged" : "";
                
                let ttf = null;
                if (a.drift?.length) {
                    const times = a.drift.filter(d => d.ttf_min != null).map(d => d.ttf_min);
                    if (times.length) ttf = Math.min(...times);
                }

                const msgStyled = a.message.split("\n").map(line => {
                    if (line.trim().startsWith("[") && line.trim().endsWith("]")) {
                        return `<span class="report-section">${line.trim()}</span>`;
                    }
                    return line;
                }).join("\n");

                return `
                    <div class="alert-card ${ackClass}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <span class="severity-badge badge-${a.severity}" style="background:${color}22; color:${color}">${a.severity}</span>
                                <span style="font-weight:700; font-size:14px; font-family:'Outfit'">${a.machine_id}</span>
                            </div>
                            <span style="font-size:12px; color:var(--text-secondary); font-weight:500;">${a.time}</span>
                        </div>
                        <div class="msg-box" style="white-space:pre-wrap;">${msgStyled}</div>
                        <div class="action-bar">
                            <div style="display:flex; gap:12px;">
                                ${a.compound ? `<span style="font-size:11px; font-weight:600; color:var(--accent-indigo); display:flex; align-items:center; gap:4px;"><i data-lucide="fingerprint" style="width:12px;"></i>${a.compound}</span>` : ""}
                                ${ttf != null ? `<span style="font-size:11px; font-weight:700; color:${ttf < 10 ? 'var(--status-critical)' : 'var(--status-warning)'}">ETA FAILURE: ${Math.floor(ttf)}m</span>` : ""}
                            </div>
                            <button class="btn-ack" onclick="acknowledge('${a.machine_id}')">${a.acknowledged ? "Resolved" : "Acknowledge"}</button>
                        </div>
                    </div>`;
            }).join("");
        }

        function renderTTF(alerts) {
            const panel = document.getElementById("ttf-list");
            const ttfs = {};
            alerts.forEach(a => {
                (a.drift || []).forEach(d => {
                    if (d.ttf_min != null) {
                        const k = `${a.machine_id}-${d.sensor}`;
                        if (!ttfs[k] || d.ttf_min < ttfs[k].ttf_min) ttfs[k] = { machine: a.machine_id, ...d };
                    }
                });
            });

            const items = Object.values(ttfs);
            if (!items.length) {
                panel.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-secondary); font-size:14px;"><i data-lucide="shield-check" style="width:32px; height:32px; display:block; margin:0 auto 12px; opacity:0.3;"></i>All systems stable</div>`;
                return;
            }

            panel.innerHTML = items.map(it => {
                const color = it.ttf_min < 10 ? 'var(--status-critical)' : it.ttf_min < 30 ? 'var(--status-warning)' : 'var(--status-healthy)';
                return `
                    <div class="ttf-card">
                        <div style="font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:4px;">${it.machine}</div>
                        <div class="ttf-val" style="color:${color}">${Math.floor(it.ttf_min)}m ${Math.round((it.ttf_min % 1)*60)}s</div>
                        <div style="font-size:11px; font-weight:500; color:var(--text-secondary)">${SENSOR_LABELS[it.sensor]} Critical Threshold Arrival</div>
                    </div>`;
            }).join("");
        }

        function renderCalendar(scheduled) {
            const cal = document.getElementById("calendar");
            const entries = Object.entries(scheduled);
            if (!entries.length) {
                cal.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-secondary); font-size:13px;">No maintenance queued</div>`;
                return;
            }
            cal.innerHTML = entries.map(([m, slot]) => `
                <div class="ttf-card" style="display:flex; align-items:center; gap:16px;">
                    <div style="background:var(--accent-emerald)22; color:var(--accent-emerald); padding:10px; border-radius:12px;"><i data-lucide="calendar-check"></i></div>
                    <div>
                        <div style="font-weight:700; font-size:14px;">${m}</div>
                        <div style="font-size:12px; color:var(--text-secondary)">${slot}</div>
                    </div>
                </div>`).join("");
        }

        function renderSystemicBanner(alerts) {
            const banner = document.getElementById("systemic-banner");
            const systemic = alerts.find(a => !a.acknowledged && a.systemic);
            if (systemic) {
                banner.style.display = "block";
                banner.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="display:flex; align-items:center; gap:12px;">
                            <i data-lucide="alert-triangle" style="color:var(--status-critical)"></i>
                            <span>SYSTEMIC ALERT: <span style="color:white; font-weight:800;">${systemic.systemic.name.toUpperCase()}</span></span>
                        </span>
                        <span style="font-size:12px; opacity:0.8; background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:99px;">ID: ${systemic.systemic.id}</span>
                    </div>`;
            } else {
                banner.style.display = "none";
            }
        }

        async function acknowledge(machine_id) {
            await fetch("http://localhost:5000/acknowledge", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ machine_id })
            });
        }

        // Approximate baseline from first N readings
        function updateApproxBaseline(readings) {
            MACHINES.forEach(m => {
                if (!readings[m]) return;
                if (!approxBaseline[m]) approxBaseline[m] = {};
                SENSORS.forEach(s => {
                    const vals = history[m][s];
                    if (vals.length < 5) return;
                    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
                    const std = Math.max(0.01, Math.sqrt(
                        vals.reduce((a, b) => a + (b - mean) ** 2, 0) / vals.length
                    ));
                    approxBaseline[m][s] = { mean, std };
                });
            });
        }

        // Main poll loop
        async function poll() {
            try {
                const res = await fetch("/status");
                const data = await res.json();

                // Store readings history
                MACHINES.forEach(m => {
                    const r = data.readings?.[m];
                    if (!r) return;
                    SENSORS.forEach(s => {
                        if (r[s] != null) {
                            history[m][s].push(r[s]);
                            if (history[m][s].length > 60) history[m][s].shift();
                        }
                    });
                });

                updateApproxBaseline(data.readings || {});
                renderMachineCards(data.readings || {}, data.streams || {});
                renderHeatmap(data.readings || {});
                renderAlerts(data.alerts || [], data.scheduled || {});
                renderTTF(data.alerts || []);
                renderCalendar(data.scheduled || {});
                renderSystemicBanner(data.alerts || []);
                updateTimelineChart();
                
                // Initialize Lucide icons for any new DOM elements
                if (window.lucide) lucide.createIcons();

                const indicator = document.querySelector(".live-dot");
                if (indicator) {
                    indicator.style.background = "var(--accent-emerald)";
                    indicator.style.animation = "pulse-ring 2s infinite";
                }

            } catch (e) {
                console.error("API disconnected:", e);
                document.querySelector(".live-dot").style.background = "#FF4D4D";
                document.querySelector(".live-dot").style.animation = "none";
            }
        }

        setInterval(poll, 2000);
        poll();
    </script>
</body>

</html>
